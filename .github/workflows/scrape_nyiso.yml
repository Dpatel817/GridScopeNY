name: Daily NYISO Scraper

on:
  schedule:
    # Runs at 12:00 PM UTC (8:00 AM EDT) every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Change this to match your version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run Scraper Script
        run: python ETL/fetch_nyiso_data.py

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/raw/*
          # This will only commit if there are new files
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily NYISO data download" && git push)
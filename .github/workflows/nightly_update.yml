name: Nightly NYISO Data Update

on:
  schedule:
    - cron: '0 5 * * *'  # midnight ET (UTC-5)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Run nightly updater
        run: python daily_scraper.py --all

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/ logs/
          git diff --cached --quiet || git commit -m "chore: nightly NYISO data update [skip ci]"
          git push
